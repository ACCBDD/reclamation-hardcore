#If enabled, a button to the Diet GUI appears in player inventories.
addButton = true
#How quality coloring for nutrient bars is displayed in the Diet GUI.
#NONE = Never display quality
#HOVER = Display quality only when hovering a bar
#TOGGLE = Display a toggle button that enables quality on all bars
#BOTH = Enable both hover and toggle behaviors
#Allowed Values: NONE, HOVER, TOGGLE, BOTH
qualityDisplayMode = "NONE"
#The x-position of the Diet GUI button in player inventories.
#Range: -10000 ~ 10000
buttonX = 126
#The y-position of the Diet GUI button in player inventories.
#Range: -10000 ~ 10000
buttonY = -22
#The primary text color of the Diet GUI, as an integer or hexadecimal.
textColor = "4210752"

