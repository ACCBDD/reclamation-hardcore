
[food]

	[food.regen]

		[food.regen.fast]
			#Minimum hunger level required for fast regeneration to occur.
			#Range: 0 ~ 20
			food_threshold = 20
			#How often fast regeneration heals, in ticks.
			#Range: 1 ~ 20000
			interval_ticks = 10
			#Maximum saturation value used when calculating fast regeneration healing.
			#Range: 0.0 ~ 20.0
			saturation_cap = 6.0

		[food.regen.slow]
			#Minimum hunger level required for slow regeneration to occur.
			#Range: 0 ~ 20
			food_threshold = 18
			#How often slow regeneration heals, in ticks.
			#Range: 1 ~ 20000
			interval_ticks = 80
			#Amount of health restored per slow regeneration tick.
			#Range: 0.0 ~ 20.0
			heal_amount = 1.0

	[food.exhaustion]
		#How much exhaustion must accumulate before hunger or saturation is reduced.
		#Functions as a global scale for hunger drain. Higher values mean slower hunger drain.
		#Range: 0.1 ~ 40.0
		step = 4.0
		#Exhaustion added every tick regardless of player actions.
		#Range: 0.0 ~ 40.0
		passive_per_tick = 0.0
		#Threshold for which exhaustion can be negative. If set to a value above -40, the exhaustion floor becomes that value.
		#Useful if something has unintentionally caused negative exhaustion and you want it set to reasonable values
		#Range: -40.0 ~ 0.0
		negative_exhaustion_threshold = -40.0

		[food.exhaustion.jump]
			#Exhaustion added when jumping while walking.
			#Range: 0.0 ~ 10.0
			walking = 0.05
			#Exhaustion added when jumping while sprinting.
			#Range: 0.0 ~ 10.0
			sprinting = 0.2

		[food.exhaustion.combat]
			#Exhaustion added when attacking an entity.
			#Range: 0.0 ~ 40.0
			attack = 0.1
			#Exhaustion multiplier when taking damage.
			#Range: 0.0 ~ 100.0
			damage_multiplier = 1.0

		[food.exhaustion.movement]
			#Exhaustion added per block length walked.
			#Range: 0.0 ~ 40.0
			walk_one_block = 0.0
			#Exhaustion added per block length sprinted.
			#Range: 0.0 ~ 40.0
			sprint_one_block = 0.1
			#Exhaustion added per block length swum.
			#Range: 0.0 ~ 40.0
			swim_one_block = 0.01
			#Exhaustion added per block length walked underwater.
			#Range: 0.0 ~ 40.0
			walk_underwater_one_block = 0.01
			#Exhaustion added per block length walked on water.
			#Range: 0.0 ~ 40.0
			walk_on_water_one_block = 0.01
			#Exhaustion added per block length climbed.
			#Range: 0.0 ~ 40.0
			climb_one_block = 0.0
			#Exhaustion added per block length crouched.
			#Range: 0.0 ~ 40.0
			crouch_one_block = 0.0
			#Exhaustion added per block length flown with elytra.
			#Range: 0.0 ~ 40.0
			aviate_one_block = 0.0
			#Exhaustion added per block length moved in the air.
			#Range: 0.0 ~ 40.0
			fly_one_block = 0.0

[misc]
	#Enable water bottle pickup adjustments, requiring 4 bottles to fill, and replacing the water source block
	enable_bottle_pickup_adjustments = true
	#Enable falling block adjustments, giving falling blocks a chance to break the partial blocks they land on
	enable_falling_block_breaking_adjustments = false
	#Enable zombie villager conversion, disable to prevent zombie villagers from being cured
	enable_zombie_villager_curing = true
	#Prevent flowing water from becoming a source via block placement.
	#- Water plants (kelp, seagrass, Farmer's Delight rice) cannot be placed or grown in flowing water
	#- Waterloggable blocks (ladders, fences, signs, stairs, slabs, etc.) placed in flowing water are not waterlogged
	enable_water_plant_source_prevention = true

[compat]
	#Enable Thermal series compat patches
	#- Fix Thermal machines not recognizing mod-modified stack sizes
	#- Disable crafting remainders in machines
	#- Make Chiller, Refinery, and single-fluid Dynamos ignore fluid NBT for recipe/fuel matching
	enable_thermal_patches = false
	#Hide the Obscure API title-screen button.
	#The button is added by Obscure API and cannot normally be hidden, only repositioned.
	hide_obscure_api_menu_button = false

